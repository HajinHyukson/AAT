services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: aat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-attribution}
      POSTGRES_USER: ${POSTGRES_USER:-attribution}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-attribution}
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-attribution} -d ${POSTGRES_DB:-attribution}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
